name: Personal website CI/CD Pipeline - Build docker images and Deploy to production

on:
  push:
    branches: "main"

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint project
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        include:
          - app: api
            image: me-api
            dockerfile: apps/api/Dockerfile

          - app: admin
            image: me-admin
            dockerfile: apps/admin/Dockerfile
            args: |
              VITE_API_URL: VITE_API_URL

          - app: web
            image: me-web
            dockerfile: apps/web/Dockerfile
            args: |
              PUBLIC_API_URL: PUBLIC_API_URL

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v7
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          build-args: ${{ secrets[matrix.args] }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
