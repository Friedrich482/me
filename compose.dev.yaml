name: me-dev

services:
  database:
    image: postgres:17-alpine
    container_name: me-dev-db
    ports:
      - 127.0.0.1:5431:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - me_postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=me

volumes:
  me_postgres:
    name: me_postgres_db
